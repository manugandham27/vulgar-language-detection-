<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard — Capstone Edition</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        .chart-container {
            background: rgba(0,0,0,0.2);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <nav style="margin-bottom: 2rem;">
            <a href="/" style="color: var(--accent); text-decoration: none; font-weight: 600;">← Back to Video Analyzer</a>
        </nav>

        <header>
            <h1>AI Performance Analytics</h1>
            <p>Interactive metrics detailing the training performance of the Bi-LSTM Model against 50,000 synthetic parameters.</p>
        </header>

        <main class="glass-panel">
            <div class="dashboard-grid">
                <!-- Chart 1 -->
                <div class="chart-container">
                    <h3 style="text-align: center; margin-bottom: 1rem;">Training Class Distribution</h3>
                    <canvas id="pieChart"></canvas>
                </div>
                
                <!-- Chart 2 -->
                <div class="chart-container">
                    <h3 style="text-align: center; margin-bottom: 1rem;">Model Accuracy Comparison</h3>
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container" style="margin-top: 2rem;">
                <h3 style="text-align: center; margin-bottom: 1rem;">Bi-LSTM Training History (Epoch vs Loss)</h3>
                <canvas id="lineChart" style="max-height: 300px;"></canvas>
            </div>
        </main>
    </div>

    <script>
        // Set defaults for charts to match dark theme
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = 'rgba(148, 163, 184, 0.1)';

        // 1. Pie Chart
        const pieCtx = document.getElementById('pieChart').getContext('2d');
        new Chart(pieCtx, {
            type: 'doughnut',
            data: {
                labels: ['Clean', 'Profanity', 'Hate Speech', 'Abuse', 'Spam/Toxic'],
                datasets: [{
                    data: [10000, 10000, 10000, 10000, 10000],
                    backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#db2777', '#8b5cf6'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '70%' }
        });

        // 2. Bar Chart
        const barCtx = document.getElementById('barChart').getContext('2d');
        new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: ['Logistic', 'Naive Bayes', 'Random Forest', 'XGBoost', 'Bi-LSTM (Deep)'],
                datasets: [{
                    label: 'Validation Accuracy (%)',
                    data: [96.5, 94.2, 98.1, 99.0, 99.5],
                    backgroundColor: 'rgba(59, 130, 246, 0.8)',
                    borderRadius: 4
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: false, min: 90, max: 100 }
                }
            }
        });

        // 3. Line Chart
        const lineCtx = document.getElementById('lineChart').getContext('2d');
        new Chart(lineCtx, {
            type: 'line',
            data: {
                labels: ['Epoch 1', 'Epoch 2', 'Epoch 3', 'Epoch 4', 'Epoch 5', 'Epoch 6'],
                datasets: [
                    {
                        label: 'Training Loss',
                        data: [1.2, 0.8, 0.4, 0.2, 0.1, 0.05],
                        borderColor: '#10b981',
                        tension: 0.3
                    },
                    {
                        label: 'Validation Loss',
                        data: [1.1, 0.7, 0.35, 0.15, 0.08, 0.06],
                        borderColor: '#ef4444',
                        tension: 0.3
                    }
                ]
            }
        });
    </script>
</body>
</html>
